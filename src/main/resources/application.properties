spring.application.name=projectBack
spring.main.web-application-type=servlet
server.port=80
server.servlet.context-path=/projectBack

# ==== Datasource setting
spring.sql.init.platform=oracle
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=teamC
spring.datasource.password=teamC

#myBatis mapping
#typeAlias => @Alias("AliasName")
mybatis.type-aliases-package=kr.co.ictedu.projectBack.vo

#mapper => src/main/resources : classpath
mybatis.mapper-locations=classpath:mappers/*.xml

#fileupload Configure
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=D:\\ictstudy\\springboot\\workspace\\projectBack\\src\\main\\resources\\static\\imgfile